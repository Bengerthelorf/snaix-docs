name: Poll rebuild

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::SNAIX_DOCS_DEPLOY_HOOK not set — skipping ping"
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
        env:
          HOOK: ${{ secrets.SNAIX_DOCS_DEPLOY_HOOK }}
